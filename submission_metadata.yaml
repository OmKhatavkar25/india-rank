  - "Claude"

ai_usage_summary: |
  Claude was used as a coding assistant only.
  All ranking logic, feature extraction rules, scoring weights,
  and architecture were designed and built manually by the human participant.

methodology_summary: |
  Rule-based ranker with explicit reasoning. Eight scoring components
  (ML/AI experience, product company background, skill relevance,
  startup experience, career stability, experience years,
  behavioral signals, education/location) weighted to match
  the Senior AI Engineer Founding Team JD. The key insight: the JD
  explicitly warns against keyword counting — so the ranker evaluates
  career history for actual ML/AI roles at product companies, detects
  retrieval/ranking/embedding experience, and penalizes consulting-only
  backgrounds. Startup experience bonus surfaces founding-team-fit
  candidates. Summary/headline parsing catches ML profiles missed by
  title-only matching. Honeypot detection flags impossible skill/exp
  combos. Runtime: ~15 seconds for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: false
  reproduction_tested: true
