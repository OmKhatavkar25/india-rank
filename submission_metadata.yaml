ai_usage_summary: |
  Claude was used as a coding assistant only.
  All ranking logic, feature extraction rules, scoring weights,
  and architecture were designed and built manually by the human participant.

methodology_summary: |
  Rule-based ranker with explicit reasoning. Seven scoring components
  (ML/AI experience, product company background, skill relevance,
  career stability, experience years, behavioral signals, education/location)
  weighted to match the Senior AI Engineer JD. The key insight is that the JD
  explicitly warns against keyword counting — so the ranker evaluates career
  history for actual ML/AI roles at product companies, detection of retrieval/
  ranking/embedding experience in role descriptions, and penalizes consulting-only
  backgrounds. Behavioral signals (response rate, recency, notice period) act
  as a multiplier. Honeypot detection flags impossible skill/experience combos.
  Runtime: ~12 seconds for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: false
  reproduction_tested: true
