version: "3.9"

services:
  ranker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../data:/app/data
      - ../output:/app/output
      - ../config:/app/config
    command: rank data/job_descriptions/senior_software_engineer___distributed_systems.json data/candidates --output output/results.csv

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../output:/app/output
