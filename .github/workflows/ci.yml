name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/candidate_ranker/
      - run: mypy src/candidate_ranker/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --cov=src/candidate_ranker --cov-report=xml
      - uses: codecov/codecov-action@v3

  generate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - run: python -m candidate_ranker.io.generator
      - name: Verify generated data
        run: |
          test -d data/candidates && echo "Candidates OK"
          test -d data/job_descriptions && echo "JDs OK"
          echo "Found $(ls data/candidates/*.json | wc -l) candidates"
          echo "Found $(ls data/job_descriptions/*.json | wc -l) job descriptions"
